# config.example.yaml — 模板配置文件，复制为 config.yaml 并填入真实值

# 服务
server:
  host: 0.0.0.0
  https_port: 9787
  http_port: 9788

# OpenCode
opencode:
  url: http://127.0.0.1:5096
  directory: ai
  default_model: deepseek-v4-flash
  default_provider: deepseek

# 功能开关
features:
  opencode_mock_enabled: false    # 是否启用 OpenCode 模拟模式（调试用）

# SSL
ssl:
  cert: path/to/your/cert.pem
  key: path/to/your/key.pem

# API
api:
  dashscope_key: YOUR_DASHSCOPE_API_KEY
  mimo_key: YOUR_MIMO_API_KEY

# 认证
auth:
  username: Axeuh
  password_hash: ""

# 启动器路径（替换为你的实际路径）
launcher:
  conda_python: /path/to/your/python
  opencode_cmd: /path/to/your/opencode

# 智能体
agent:
  default_type: explore
  available: [explore, librarian, oracle, hephaestus, metis, momus]

# 数据目录（默认相对于项目根目录，可用绝对路径覆盖）
data:
  dir: ai/data
  sessions: ai/data/usersessions.json
  tasks: ai/data
  voiceprints: ai/data/voiceprints.json
  ai_root: ai

# 日志
log:
  level: INFO

# 记忆系统
memory:
  search_threshold: 0.7
  search_limit: 10
